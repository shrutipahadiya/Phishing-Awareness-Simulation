<!DOCTYPE html>
<html>
<head>
    <title>Phishing Awareness Simulation</title>
    <style>
        body {
            font-family: Arial;
            background-color: #f2f2f2;
            text-align: center;
        }
        .login-box {
            background: white;
            width: 300px;
            margin: 100px auto;
            padding: 20px;
            box-shadow: 0px 0px 10px gray;
        }
        input {
            width: 90%;
            padding: 8px;
            margin: 8px;
        }
        button {
            padding: 8px 15px;
            background: blue;
            color: white;
            border: none;
        }
    </style>
</head>
<body>

<div class="login-box">
    <h2>Login Page</h2>
    <form onsubmit="showAlert(); return false;">
        <input type="text" placeholder="Email" required><br>
        <input type="password" placeholder="Password" required><br>
        <button type="submit">Login</button>
    </form>
</div>

<script>
function showAlert() {
    alert("This was a phishing awareness simulation. Never enter credentials on unknown websites!");
}
</script>

</body>
</html>
